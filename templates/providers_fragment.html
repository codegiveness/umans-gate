    <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
      {% for provider in providers %}
      <article class="bg-slate-900 rounded-lg p-4">
        <div class="flex items-baseline justify-between gap-3">
          <h2 class="text-sm font-medium text-slate-300">{{ provider.provider }}</h2>
          <span class="text-xs tabular-nums text-slate-500">{{ provider.in_flight }} / {{ provider.capacity }} weight</span>
        </div>
        <div class="mt-3 bg-slate-700 h-2 rounded-full overflow-hidden">
          <div class="bg-emerald-500 h-2 rounded-full" style="width: {{ provider.pct() }}%"></div>
        </div>
      </article>
      {% endfor %}
    </section>
