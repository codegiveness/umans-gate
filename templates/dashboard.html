<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>umans-gate dashboard</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-6">
    <header class="mb-6">
      <h1 class="text-2xl md:text-3xl font-semibold tracking-tight text-slate-100">umans-gate</h1>
      <p class="text-sm text-slate-500">weighted concurrency dashboard</p>
    </header>

    <div id="provider-gauges"
         hx-get="/dashboard/providers"
         hx-trigger="every 1s"
         hx-swap="innerHTML">
    <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
      {% for provider in providers %}
      <article class="bg-slate-900 rounded-lg p-4">
        <div class="flex items-baseline justify-between gap-3">
          <h2 class="text-sm font-medium text-slate-300">{{ provider.provider }}</h2>
          <span class="text-xs tabular-nums text-slate-500">{{ provider.in_flight }} / {{ provider.capacity }} weight</span>
        </div>
        <div class="mt-3 bg-slate-700 h-2 rounded-full overflow-hidden">
          <div class="bg-emerald-500 h-2 rounded-full" style="width: {{ provider.pct() }}%"></div>
        </div>
      </article>
      {% endfor %}
    </section>
    </div>

    <div id="request-list"
         hx-get="/dashboard/requests"
         hx-trigger="every 1s"
         hx-swap="innerHTML"
         class="mt-6"></div>
  </div>
</body>
</html>
