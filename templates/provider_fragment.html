{% for p in providers %}
<div id="provider-{{ p.provider }}">
  <h2>{{ p.provider }}</h2>
  <p>{{ p.in_flight }} / {{ p.capacity }} weight in use</p>
  <table>
    <tr><th>Model</th><th>State</th><th>Active</th></tr>
    {% for m in &p.active_models %}
    <tr><td>{{ m.model }}</td><td class="{{ m.state }}">{{ m.state }}</td><td>{{ m.count }}</td></tr>
    {% endfor %}
  </table>
</div>
{% endfor %}
