name: Bug report
description: Report a bug or unexpected behavior in umans-gate
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of umans-gate are you running?
      placeholder: "0.1.0 or main@commit"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug in a few sentences.
      placeholder: The gateway returned a 503 when I expected a queued request to wait.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest set of steps that triggers the issue.
      placeholder: |
        1. Start umans-gate with examples/config.yaml
        2. Send POST /umans/v1/chat/completions with ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe the behavior you expected.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Paste the relevant parts of your config.yaml or CLI flags.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste any relevant logs or error messages.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this has not been reported yet.
          required: true
