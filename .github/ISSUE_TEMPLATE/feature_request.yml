name: Feature request
description: Suggest an idea or improvement for umans-gate
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Let us know. Please focus on the problem you want to solve and any use cases that motivate the request.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem do you want to solve? Why is it important?
      placeholder: "When running umans-gate behind a reverse proxy, it is hard to ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there other ways to solve this? What trade-offs did you consider?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, examples, or references.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this feature has not been requested yet.
          required: true
