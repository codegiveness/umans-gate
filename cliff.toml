# git-cliff configuration for umans-gate.
# https://git-cliff.org/docs/configuration

[changelog]
# changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

"""
# template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}({{ commit.scope }}) {% endif %}{% if commit.breaking %}[breaking] {% endif %}{{ commit.message | upper_first }}
    {% endfor %}
{% endfor %}
"""
# template for the changelog footer
footer = """
"""
# remove the leading and trailing whitespace
trim = true

[git]
# parse commits based on https://www.conventionalcommits.org
conventional_commits = true

# filter out commits that are not conventional
filter_unconventional = false

# process each line of a commit as an individual commit
split_commits = false

# regex for parsing and grouping commits
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^docs?", group = "Documentation" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^chore|^ci|^style|^test|^perf|^build", group = "Miscellaneous" },
    { message = "^revert", group = "Miscellaneous" },
]

# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = false

# filter out commits that are not matched by commit parsers
filter_commits = false

# regex for matching tags
tag_pattern = 'v[0-9]+\.[0-9]+\.[0-9]+'

# sort commits in topological order
topo_order = false
